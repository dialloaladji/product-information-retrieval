name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]" pytest bandit pip-audit

      - name: Security — bandit
        run: bandit -r product_retrieval/ llm/ -ll

      - name: Security — pip-audit
        run: pip-audit --ignore-vuln PYSEC-2022-43012

      - name: Tests
        run: pytest
        env:
          USE_MOCK_LLM: "true"
